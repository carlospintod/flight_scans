# Offline test suite on every push — and the permanent guard that the
# codebase stays runnable on CI's Python (3.12) even though local dev is
# on 3.14. Fixture-driven, no network, ~20 seconds.

name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest -q
      # Estimator drift guard: Python generates the fixture, Node
      # re-computes it through web/src/lib/predict.ts — any divergence
      # between the two implementations turns CI red.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: python scripts/gen_estimator_fixture.py > web/estimator-fixture.json
      - run: node web/scripts/check-estimator.mjs
