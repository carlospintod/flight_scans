# Offline test suite on every push — and the permanent guard that the
# codebase stays runnable on CI's Python (3.12) even though local dev is
# on 3.14. Fixture-driven, no network, ~20 seconds.

name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest -q
